# Synth - Docker Compose Configuration
# Production-ready setup for synth:latest

services:
  synth:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - synth:latest
    image: synth:latest
    container_name: synth
    ports:
      - "8420:8420"
    env_file:
      - .env
    environment:
      - SERVER_HOST=0.0.0.0
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
